<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tiago Martins Pinto - Art, Technology, Education</title>
    <meta
      name="description"
      content="Portfolio of Tiago Martins Pinto, artist, teacher, researcher, and creative technologist."
    >
    <meta name="theme-color" content="#0a0a0a">
    <meta property="og:title" content="Tiago Martins Pinto - Art, Technology, Education">
    <meta
      property="og:description"
      content="Artist, teacher, researcher, and creative technologist."
    >
    <meta property="og:site_name" content="Tiago Martins Pinto">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tiagomartinspinto.github.io/myportfolio/">
    <meta property="og:image" content="https://tiagomartinspinto.github.io/myportfolio/assets/projects/eating-together/eating-together-01.jpeg">
    <meta property="og:image:alt" content="Eating Together workshop table with participants gathered around collective activity">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Tiago Martins Pinto - Art, Technology, Education">
    <meta
      name="twitter:description"
      content="Artist, teacher, researcher, and creative technologist."
    >
    <meta name="twitter:image" content="https://tiagomartinspinto.github.io/myportfolio/assets/projects/eating-together/eating-together-01.jpeg">
    <meta name="twitter:image:alt" content="Eating Together workshop table with participants gathered around collective activity">
    <link rel="canonical" href="https://tiagomartinspinto.github.io/myportfolio/">
    <link rel="icon" href="assets/favicon.ico" sizes="any">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="background.js"></script>
    <script type="module" src="script.js"></script>
  </head>
  <body class="is-building">
    <canvas class="processing-background" id="processing-background" aria-hidden="true"></canvas>

    <header class="site-header">
      <div class="site-header__inner section">
        <a class="site-brand" id="site-brand" href="#top">TIAGO MARTINS PINTO</a>
        <p class="site-mark" id="site-mark" aria-hidden="true">:-]</p>
        <a class="site-contact" id="site-contact" href="mailto:tiago.martinspinto@aalto.fi">Message me!</a>
      </div>
    </header>

    <main class="site-main" id="top">
      <section class="section section--work" id="work">
        <div class="filters" id="project-filters" aria-label="Project filters"></div>
        <div class="project-loading" id="project-loading" role="status" aria-live="polite" aria-label="Loading projects">
          ::
        </div>
        <div class="project-grid" id="project-grid"></div>
        <button class="load-more-projects" id="load-more-projects" type="button" aria-label="Load more projects" title="Load more projects" hidden>
          +
        </button>
      </section>

    </main>

    <footer class="site-footer section" id="contact">
      <div class="site-footer__grid">
        <section class="footer-column footer-column--links">
          <ul class="footer-links" id="footer-social-links"></ul>
        </section>

        <section class="footer-column footer-column--about">
          <h2 id="footer-about-title">About Me</h2>
          <p id="footer-about-text"></p>
        </section>

        <section class="footer-column footer-column--role">
          <p id="footer-location">Based in Helsinki, Finland.</p>
          <ul class="footer-links" id="footer-role-links"></ul>
        </section>
      </div>
      <a
        class="footer-local-editor"
        href="http://127.0.0.1:8787/"
        target="_blank"
        rel="noreferrer"
        title="Open local editor (requires npm run admin)"
        aria-label="Open local portfolio editor on localhost"
      >::</a>
    </footer>

    <dialog class="project-dialog" id="project-dialog" aria-labelledby="project-dialog-title" aria-describedby="project-description" aria-modal="true">
      <div class="project-dialog__inner">
        <button class="project-dialog__close" id="project-dialog-close" type="button" aria-label="Close project details">
          ×
        </button>

        <div class="project-dialog__content" id="project-dialog-content">
          <div class="project-dialog__media">
            <figure class="project-dialog__feature" id="project-feature-media"></figure>
            <div class="project-dialog__gallery" id="project-gallery" aria-label="Project media gallery"></div>
          </div>

          <div class="project-dialog__copy">
            <p class="project-dialog__kicker" id="project-dialog-kicker"></p>
            <h2 id="project-dialog-title"></h2>
            <dl class="project-meta">
              <div>
                <dt>Year</dt>
                <dd id="project-year"></dd>
              </div>
              <div>
                <dt>Role</dt>
                <dd id="project-role"></dd>
              </div>
              <div>
                <dt>Type</dt>
                <dd id="project-type"></dd>
              </div>
            </dl>
            <ul class="tag-list" id="project-tags"></ul>
            <div class="project-description" id="project-description"></div>
            <div class="project-links" id="project-links"></div>
          </div>
        </div>
      </div>
    </dialog>

    <dialog class="image-lightbox" id="image-lightbox" aria-label="Full image view">
      <button class="image-lightbox__close" id="image-lightbox-close" type="button" aria-label="Close full image view">
        ×
      </button>
      <figure class="image-lightbox__figure">
        <img id="image-lightbox-image" alt="">
        <figcaption class="image-lightbox__caption" id="image-lightbox-caption"></figcaption>
      </figure>
    </dialog>
  </body>
</html>
